<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Video Saver - Мобильная версия</title>
    <link rel="stylesheet" href="m.styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="theme-color" content="#ff0000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="mobile-container">
        <!-- Нижняя навигационная панель (мобильная) -->
        <div class="bottom-nav">
            <div class="nav-item active" data-category="all">
                <i class="fas fa-home"></i>
                <span>Главная</span>
            </div>
            <div class="nav-item" data-category="tiktok">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
            </div>
            <div class="nav-item" data-category="youtube">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </div>
            <div class="nav-item" data-category="vk">
                <i class="fab fa-vk"></i>
                <span>VK</span>
            </div>
            <div class="nav-item" data-category="local">
                <i class="fas fa-download"></i>
                <span>Мои</span>
            </div>
        </div>

        <!-- Шапка -->
        <header class="mobile-header">
            <div class="header-left">
                <i class="fas fa-video logo-icon"></i>
                <h1>Video Saver</h1>
            </div>
            <div class="header-right">
                <a href="index.html" class="desktop-link" title="Полная версия">
                    <i class="fas fa-desktop"></i>
                </a>
                <button class="mobile-search-btn" id="mobileSearchBtn">
                    <i class="fas fa-search"></i>
                </button>
                <button class="mobile-add-btn" id="mobileAddBtn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
        </header>

        <!-- Поисковая строка (скрыта по умолчанию) -->
        <div class="mobile-search-bar" id="mobileSearchBar">
            <input type="text" id="mobileSearchInput" placeholder="Поиск видео...">
            <button id="mobileSearchSubmit"><i class="fas fa-search"></i></button>
            <button class="close-search" id="closeSearch"><i class="fas fa-times"></i></button>
        </div>

        <!-- Категории (горизонтальный скролл) -->
        <div class="categories-scroll" id="categoriesScroll">
            <div class="category-chip active" data-category="all">Все</div>
            <div class="category-chip" data-category="tiktok">TikTok</div>
            <div class="category-chip" data-category="youtube">YouTube</div>
            <div class="category-chip" data-category="vk">VK</div>
            <div class="category-chip" data-category="edits">Edit'ы</div>
            <div class="category-chip" data-category="local">Мои видео</div>
            <div class="category-chip more-categories" id="moreCategoriesBtn">
                <i class="fas fa-chevron-down"></i> Ещё
            </div>
        </div>

        <!-- Сетка видео -->
        <main class="mobile-videos-grid" id="mobileVideosGrid">
            <!-- Видео будут загружаться сюда -->
        </main>

        <!-- Модальное окно для добавления видео -->
        <div id="mobileVideoModal" class="mobile-modal">
            <div class="mobile-modal-content">
                <div class="mobile-modal-header">
                    <h2>Добавить видео</h2>
                    <button class="mobile-modal-close">&times;</button>
                </div>
                <form id="mobileVideoForm">
                    <div class="mobile-form-group">
                        <label>Ссылка на видео</label>
                        <input type="url" id="mobileVideoUrl" placeholder="https://...">
                        <small>YouTube, VK, TikTok</small>
                    </div>
                    
                    <div class="mobile-form-divider">или</div>
                    
                    <div class="mobile-form-group">
                        <label>Загрузить с телефона</label>
                        <div class="file-upload-area" id="fileUploadArea">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Нажмите для выбора файла</p>
                            <small>MP4, 3GP, MOV до 50 МБ</small>
                            <input type="file" id="mobileVideoFile" accept="video/*" capture style="display: none;">
                        </div>
                    </div>

                    <div class="mobile-form-group">
                        <label>Название</label>
                        <input type="text" id="mobileVideoTitle" required placeholder="Введите название">
                    </div>
                    
                    <div class="mobile-form-group">
                        <label>Категория</label>
                        <select id="mobileVideoCategory" required>
                            <option value="tiktok">TikTok</option>
                            <option value="youtube">YouTube Shorts</option>
                            <option value="vk">VK Видео</option>
                            <option value="edits">Edit'ы</option>
                            <option value="local">Мои видео</option>
                        </select>
                    </div>
                    
                    <div class="mobile-form-group">
                        <label>Миниатюра (URL)</label>
                        <input type="url" id="mobileVideoThumbnail" placeholder="https://... (необязательно)">
                    </div>
                    
                    <button type="submit" class="mobile-submit-btn">Сохранить видео</button>
                </form>
            </div>
        </div>

        <!-- Модальное окно просмотра видео -->
        <div id="mobilePlayerModal" class="mobile-modal player-modal">
            <div class="mobile-modal-content player-content">
                <div class="mobile-player-header">
                    <button class="mobile-player-close">&times;</button>
                    <h3 id="mobilePlayerTitle"></h3>
                </div>
                <div class="mobile-video-player-container" id="mobileVideoPlayer">
                    <!-- Сюда будет вставляться плеер -->
                </div>
                <div class="mobile-video-stats">
                    <span><i class="fas fa-eye"></i> <span id="mobileViewCount">0</span></span>
                    <span><i class="fas fa-calendar"></i> <span id="mobileVideoDate"></span></span>
                    <span id="mobileVideoFileInfo"></span>
                </div>
            </div>
        </div>

        <!-- Меню дополнительных категорий -->
        <div class="categories-menu" id="categoriesMenu">
            <div class="categories-menu-header">
                <h3>Все категории</h3>
                <button class="close-menu">&times;</button>
            </div>
            <div class="categories-menu-content" id="customCategoriesMenu">
                <!-- Пользовательские категории -->
            </div>
            <button class="add-category-menu-btn" id="mobileAddCategoryBtn">
                <i class="fas fa-plus"></i> Новая категория
            </button>
        </div>

        <!-- Контекстное меню для карточки видео -->
        <div class="video-context-menu" id="videoContextMenu">
            <div class="context-menu-item" id="contextEdit">
                <i class="fas fa-edit"></i> Редактировать
            </div>
            <div class="context-menu-item" id="contextDelete">
                <i class="fas fa-trash"></i> Удалить
            </div>
        </div>
    </div>

    <script src="m.script.js"></script>
</body>
</html>
