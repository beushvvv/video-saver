<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Saver - Моя коллекция</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header>
            <div class="logo">
                <i class="fas fa-video"></i>
                <h1>Video Saver</h1>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Поиск видео...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <button class="add-video-btn" id="addVideoBtn">
                <i class="fas fa-plus"></i> Добавить видео
            </button>
        </header>

        <!-- Основной контент -->
        <div class="main-content">
            <!-- Сайдбар с категориями -->
            <aside class="sidebar">
                <nav>
                    <ul>
                        <li class="active" data-category="all">
                            <i class="fas fa-home"></i> Все видео
                        </li>
                        <li data-category="tiktok">
                            <i class="fab fa-tiktok"></i> TikTok
                        </li>
                        <li data-category="youtube">
                            <i class="fab fa-youtube"></i> YouTube Shorts
                        </li>
                        <li data-category="vk">
                            <i class="fab fa-vk"></i> VK Видео
                        </li>
                        <li data-category="edits">
                            <i class="fas fa-cut"></i> Edit'ы
                        </li>
                        <li data-category="local">
                            <i class="fas fa-download"></i> Мои видео
                        </li>
                    </ul>
                </nav>
                <div class="categories-section">
                    <h3>Мои категории</h3>
                    <div id="customCategories"></div>
                    <button id="addCategoryBtn" class="add-category-btn">
                        <i class="fas fa-plus"></i> Новая категория
                    </button>
                </div>
            </aside>

            <!-- Сетка видео -->
            <main class="videos-grid" id="videosGrid">
                <!-- Видео будут загружаться сюда -->
            </main>
        </div>

        <!-- Модальное окно для добавления/редактирования видео -->
        <div id="videoModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2>Добавить видео</h2>
                <form id="videoForm">
                    <div class="form-group">
                        <label for="videoUrl">Ссылка на видео (из интернета):</label>
                        <input type="url" id="videoUrl" placeholder="https://...">
                        <small style="color: #666; display: block; margin-top: 5px;">Для YouTube, VK, TikTok</small>
                    </div>
                    
                    <div class="form-divider">
                        <span>или</span>
                    </div>
                    
                    <div class="form-group">
                        <label for="videoFile">Загрузить видео с компьютера:</label>
                        <input type="file" id="videoFile" accept="video/*">
                        <small style="color: #666; display: block; margin-top: 5px;">
                            ⚡ Видео сохранится в браузере и будет доступно даже после удаления с ПК
                        </small>
                        <small style="color: #ff6b6b; display: block; margin-top: 5px;">
                            📌 Макс. размер: 50 МБ (поддержка MP4, WebM, AVI)
                        </small>
                    </div>

                    <div class="form-group">
                        <label for="videoTitle">Название:</label>
                        <input type="text" id="videoTitle" required placeholder="Введите название">
                    </div>
                    
                    <div class="form-group">
                        <label for="videoCategory">Категория:</label>
                        <select id="videoCategory" required>
                            <option value="tiktok">TikTok</option>
                            <option value="youtube">YouTube Shorts</option>
                            <option value="vk">VK Видео</option>
                            <option value="edits">Edit'ы</option>
                            <option value="local">Мои видео</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="videoThumbnail">Миниатюра (URL):</label>
                        <input type="url" id="videoThumbnail" placeholder="https://... (оставьте пустым для авто)">
                    </div>
                    
                    <button type="submit" class="submit-btn">Сохранить видео</button>
                </form>
            </div>
        </div>

        <!-- Модальное окно просмотра видео -->
        <div id="playerModal" class="modal player-modal">
            <div class="modal-content player-content">
                <span class="close-player">&times;</span>
                <div class="video-player-container">
                    <!-- Сюда будет вставляться плеер -->
                </div>
                <div class="video-info">
                    <h3 id="playerVideoTitle"></h3>
                    <div class="video-stats">
                        <span><i class="fas fa-eye"></i> <span id="viewCount">0</span> просмотров</span>
                        <span><i class="fas fa-calendar"></i> <span id="videoDate"></span></span>
                        <span id="videoFileInfo" style="display: none;"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
